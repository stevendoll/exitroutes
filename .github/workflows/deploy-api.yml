name: deploy-api

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/deploy-api.yml'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Build Lambda package
        run: |
          mkdir -p package
          pip install -r api/requirements.txt -t package/ -q
          cp api/webhook.py package/
          cd package && zip -r ../lambda.zip . -q

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name exitroutes-webhook \
            --zip-file fileb://lambda.zip \
            --region us-east-1

      - name: Update Lambda env vars
        env:
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          TYPEFORM_LINK: ${{ secrets.TYPEFORM_LINK }}
        run: |
          aws lambda update-function-configuration \
            --function-name exitroutes-webhook \
            --environment "Variables={\
              STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }},\
              FROM_EMAIL=steven@t12n.ai,\
              TYPEFORM_LINK=${{ secrets.TYPEFORM_LINK }},\
              SLACKMAIL_URL=${{ secrets.SLACKMAIL_URL }},\
              SLACKMAIL_API_KEY=${{ secrets.SLACKMAIL_API_KEY }}\
            }" \
            --region us-east-1
